name: fodder_workspace
publish_to: none

workspace:
  - apps/fodder_game
  - packages/fodder_core
  - packages/fodder_tools
  - packages/fodder_assets

environment:
  sdk: ^3.11.0
  flutter: ^3.41.2

dev_dependencies:
  melos: ^7.4.0

melos:
  repository: https://github.com/bramp/fodder

  ide:
    intellij: false

  scripts:
    analyze:
      run: melos exec -c 1 -- "flutter analyze --no-fatal-infos"
      description: Run `flutter analyze` in all packages.

    test:
      run: melos run test:all --no-select
      description: Run `flutter test` in all packages.

    test:all:
      run: flutter test
      exec:
        concurrency: 1
      packageFilters:
        dirExists: test

    format:
      run: melos exec -c 1 -- "dart format ."
      description: Run `dart format` in all packages.
    run:game:
      exec:
        concurrency: 1
      run: flutter run -d chrome
      description: Run the game in Chrome.
      packageFilters:
        scope: fodder_game
